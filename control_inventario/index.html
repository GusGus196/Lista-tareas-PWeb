<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Inventario</h1>
    <div>
        <form action="agregar">
            <label>Nombre: <input type="text" id="name"> </label> <br>
            <label>Cantidad: <input type="number" id="amount"> </label><br>
            <label>Precio <input type="number" id="cost"> </label><br>
            <label>Categoria <input type="text" id="categoria"> </label><br>
            <label>Fecha <input type="date" id="date"> </label> <br>
            <button type="button" id="btnAgregar">Enviar</button> <br> <br>

            <label>Ver producto por nombre: <input type="text" id="buscar"></label>
            <button type="button" id="btnBuscar">Buscar</button>
        </form>

    </div>
    
    <script src="app.js"></script>
</body>
</html>
